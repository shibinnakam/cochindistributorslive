services:
  - type: web
    name: distribution-agency
    env: node
    plan: free # Change to starter/pro if needed
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromConfigVar: MONGO_URI
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://distribution-agency.onrender.com # Update with your service name
      - key: PORT
        value: 5000
      - key: PYTHON_AI_SERVICE_URL
        value: https://distribution-agency-ai.onrender.com

  - type: web
    name: distribution-agency-ai
    env: python
    plan: free
    rootDir: python-ai
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
